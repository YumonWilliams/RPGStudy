<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG Study</title>
    <link rel="stylesheet" href="https://unpkg.com/98.css">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div class="window" style="width: 300px">
        <div class="title-bar">
            <div class="title-bar-text">A Window With Stuff In It</div>
            <div class="title-bar-controls">
                <button aria-label="Minimize"></button>
                <button aria-label="Maximize"></button>
                <button aria-label="Close"></button>
            </div>
        </div>
        <div class="window-body">
            <select style="background-color: white; color: black; border-radius:0%;">
                <option id="level-001">Coast of the Abyss</option>
                <option id="level-002">Tomb of Totality</option>
                <option id="level-003">Summit of Descent</option>
                <option id="level-004">Gordoran</option>
                <option id="level-005">World's End</option>
                <option id="level-006">Fissure of Flame</option>
                <option id="level-007">Hei Wangzuo</option>
            </select>
        </div>
        <div style="display: flex; gap: 16px; padding: 8px;" >
            <div class="field-border" style="padding: 8px; flex: 1;">
               
             
            </div>
            <div class="field-border" style="padding: 8px; flex: 1;">
                
            </div>
        </div>
        
    </div>
    
    
</body>
<script src="./js/logic.js" type="js"></script>
</html>
